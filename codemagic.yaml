# Master Codemagic Compilation Script for Pet Pebble
# Configured for Capacitor Native Build Environments (Fully Consolidated)
workflows:
  android-workflow:
    name: Android Capacitor Production Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Build Web Application Bundle Layers
        script: |
          # 1. Force source the native terminal environment profiles
          if [ -s "$HOME/.nvm/nvm.sh" ]; then . "$HOME/.nvm/nvm.sh"; fi
          if [ -s "$NVM_DIR/nvm.sh" ]; then . "$NVM_DIR/nvm.sh"; fi
          
          # 2. Verify or fallback install Node 20 runtime environments
          nvm use 20 || nvm install 20
          node --version

          cd src/main/resources/static/rocksteady-app
          
          # 3. Clean compile the web layers assets index sheets
          npm install --legacy-peer-deps
          
          # 🛠️ FIXED: Replaced "npm run build" with a direct call to the Vite bundler
          npx vite build
      - name: Capacitor Native Workspace Sync
        script: |
          if [ -s "$NVM_DIR/nvm.sh" ]; then . "$NVM_DIR/nvm.sh"; fi
          npx cap sync android
      - name: Compile Standalone Production APK Package
        script: |
          cd android && ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
           - tharunrust@gmail.com # Automatically sends the APK directly to your email inbox!
           - tharunofficerust@gmail.com # Automatically sends the APK directly to your email inbox!
        notify:
          success: true
          failure: true

