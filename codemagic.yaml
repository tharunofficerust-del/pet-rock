# Master Codemagic Compilation Script for Pet Pebble
# Final Production Version (Java 21 Stable Native Pipeline)
workflows:
  android-workflow:
    name: Android Capacitor Production Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Build Web Application Bundle Layers & Sync Workspace
        script: |
          if [ -s "$HOME/.nvm/nvm.sh" ]; then . "$HOME/.nvm/nvm.sh"; fi
          if [ -s "$NVM_DIR/nvm.sh" ]; then . "$NVM_DIR/nvm.sh"; fi
          
          nvm use 20 || nvm install 20
          
          cd src/main/resources/static/rocksteady-app
          npm install --legacy-peer-deps
          npx vite build
          npx cap sync android
      - name: Compile Standalone Production APK Package
        script: |
          export JAVA_HOME=$JAVA_HOME_21
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          
          cd src/main/resources/static/rocksteady-app/android
          
          # 🛠️ HARDWARE DRIVER BYPASS: Locks the project configuration properties to clear native wrapper crashes
          mkdir -p .gradle
          echo "org.gradle.java.home=$JAVA_HOME_21" > gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "org.gradle.caching=false" >> gradle.properties
          
          # Clean out old build configurations and run the pure single-thread compiler
          ./gradlew clean --no-daemon
          ./gradlew assembleDebug --no-daemon --stacktrace
    artifacts:
      - src/main/resources/static/rocksteady-app/android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - tharunrust@gmail.com
          - tharunofficerust@gmail.com
        notify:
          success: true
          failure: true
