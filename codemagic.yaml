# Master Codemagic Compilation Script for Pet Pebble
# Configured for Nested Java/Capacitor Build Environments (Java JDK 21 Strict Target Configuration)
workflows:
  android-workflow:
    name: Android Capacitor Production Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Build Web Application Bundle Layers & Sync Workspace
        script: |
          if [ -s "$HOME/.nvm/nvm.sh" ]; then . "$HOME/.nvm/nvm.sh"; fi
          if [ -s "$NVM_DIR/nvm.sh" ]; then . "$NVM_DIR/nvm.sh"; fi
          
          nvm use 20 || nvm install 20
          node --version
          
          cd src/main/resources/static/rocksteady-app
          
          npm install --legacy-peer-deps
          npx vite build
          npx cap sync android
      - name: Compile Standalone Production APK Package
        script: |
          export JAVA_HOME=$JAVA_HOME_21
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          
          cd src/main/resources/static/rocksteady-app/android
          
          # 🛠️ HARD HARDWARE ENFORCEMENT: Updates underlying Gradle files to force compiler options to match Java 21 options
          if [ -f "build.gradle" ]; then
            sed -i '' 's/JavaVersion.VERSION_17/JavaVersion.VERSION_21/g' build.gradle 2>/dev/null || true
            sed -i '' 's/JavaVersion.VERSION_11/JavaVersion.VERSION_21/g' build.gradle 2>/dev/null || true
          fi
          if [ -f "app/build.gradle" ]; then
            sed -i '' 's/JavaVersion.VERSION_17/JavaVersion.VERSION_21/g' app/build.gradle 2>/dev/null || true
            sed -i '' 's/JavaVersion.VERSION_11/JavaVersion.VERSION_21/g' app/build.gradle 2>/dev/null || true
          fi
          
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - src/main/resources/static/rocksteady-app/android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - tharunrust@gmail.com
          - tharunofficerust@gmail.com
        notify:
          success: true
          failure: true

# - tharunrust@gmail.com # Automatically sends the APK directly to your email inbox!
# - tharunofficerust@gmail.com # Automatically sends the APK directly to your email inbox!