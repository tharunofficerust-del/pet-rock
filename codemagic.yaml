# Master Codemagic Compilation Script for Pet Pebble
# Configured for Nested Java/Capacitor Build Environments (Java JDK 17 Configuration)
workflows:
  android-workflow:
    name: Android Capacitor Production Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Build Web Application Bundle Layers & Sync Workspace
        script: |
          if [ -s "$HOME/.nvm/nvm.sh" ]; then . "$HOME/.nvm/nvm.sh"; fi
          if [ -s "$NVM_DIR/nvm.sh" ]; then . "$NVM_DIR/nvm.sh"; fi
          
          nvm use 20 || nvm install 20
          node --version
          
          cd src/main/resources/static/rocksteady-app
          
          npm install --legacy-peer-deps
          npx vite build
          npx cap sync android
      - name: Compile Standalone Production APK Package
        script: |
          # 🆕 FIXED: Force the build machine to use Java 17/21 to resolve plugin compilation limits
          export JAVA_HOME=$JAVA_HOME_17
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          
          cd src/main/resources/static/rocksteady-app/android
          ./gradlew assembleDebug
    artifacts:
      - src/main/resources/static/rocksteady-app/android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - tharunrust@gmail.com # Automatically sends the APK directly to your email inbox!
          - tharunofficerust@gmail.com # Automatically sends the APK directly to your email inbox!
        notify:
          success: true
          failure: true


